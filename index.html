<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>meant to be?</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <audio id="mainAudio" src="assets/scene1-2/scn1.mp3"></audio>
    <audio id="shuffleAudio" src="assets/scene1-2/shuffle.mp3" loop></audio>
    <audio id="scene2Audio" src="assets/scene1-2/scn2.mp3"></audio>

    <!-- SCENE 0 -->
    <div id="scene0" class="scene-overlay scene0-bg">
      <div class="scene0-content">
        <p class="scene0-title">meant to be?</p>
        <p class="scene0-sub">a scrapbook</p>
        <button id="startBtn" class="start-btn">open</button>
      </div>
    </div>

    <!-- SCENE 1 -->
    <div id="scene1" class="scene-overlay hidden">
      <div class="train-bg"></div>
      <img
        src="assets/scene1-2/scn1.png"
        id="bag"
        class="bag-overlay"
        style="cursor: pointer"
      />
      <img src="assets/scene1-2/hand.png" id="hand" class="hand-overlay" />
    </div>

    <!-- AUDIO CONTROLS -->
    <div id="audioControls" class="audio-controls hidden">
      <button id="playPauseBtn" class="play-pause-btn" aria-label="Play/Pause">
        <svg
          id="iconPlay"
          viewBox="0 0 24 24"
          fill="currentColor"
          width="20"
          height="20"
        >
          <path d="M8 5v14l11-7z" />
        </svg>
        <svg
          id="iconPause"
          viewBox="0 0 24 24"
          fill="currentColor"
          width="20"
          height="20"
          class="hidden"
        >
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
        </svg>
      </button>
      <input
        type="range"
        id="audioSlider"
        class="audio-slider"
        min="0"
        max="100"
        value="0"
        step="0.1"
      />
    </div>

    <!-- SCENE 2 -->
    <div id="scene2" class="scene-overlay hidden">
      <img id="scn2img" src="assets/scene1-2/scn2.png" class="cover-full" />
      <button id="openBookBtn" class="open-book-btn">open the scrapbook</button>
    </div>

    <!-- BOOK -->
    <div class="book-container">
      <div class="book">
        <div class="page static-left">
          <img src="assets/scene5/scene5-left.jpg" alt="Scene 5 Left" />
        </div>
        <div class="page flip-page" id="flipPage">
          <div class="front">
            <img src="assets/scene5/scene5-right.jpg" alt="Scene 5 Right" />
          </div>
          <div class="back">
            <img src="assets/scene6/scene6-left.jpg" alt="Scene 6 Left" />
          </div>
        </div>
        <div class="page flip-page" id="page2">
          <div class="front">
            <img src="assets/scene6/scene6-right.jpg" />
          </div>
          <div class="back">
            <img src="assets/scene7/scene7-left.jpg" />
          </div>
        </div>
        <div class="page static-right">
          <img src="assets/scene6/scene6-right.jpg" />
        </div>
      </div>
      <button class="flip-btn" onclick="flipPage(event)">
        <img src="assets/button.jpg" />
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
