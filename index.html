<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Flip</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <audio id="mainAudio" src="assets/scene1&2/scene1and2.mp3"></audio>

    <!-- SCENE 0 — start screen -->
    <div id="scene0" class="scene-overlay scene0-bg">
      <div class="scene0-content">
        <p class="scene0-title">my semester away</p>
        <p class="scene0-sub">a scrapbook</p>
        <button id="startBtn" class="start-btn">open</button>
      </div>
    </div>

    <!-- SCENE 1 -->
    <div id="scene1" class="scene-overlay hidden">
      <div class="train-bg"></div>
      <img src="assets/scene1&2/scn1.png" id="bag" class="bag-overlay" />
      <img src="assets/scene1&2/hand.png" id="hand" class="hand-overlay" />
    </div>

    <div id="audioControls" class="audio-controls">
      <button id="playPauseBtn" class="play-pause-btn" aria-label="Play/Pause">
        <svg
          id="iconPlay"
          viewBox="0 0 24 24"
          fill="currentColor"
          width="20"
          height="20"
        >
          <path d="M8 5v14l11-7z" />
        </svg>
        <svg
          id="iconPause"
          viewBox="0 0 24 24"
          fill="currentColor"
          width="20"
          height="20"
          class="hidden"
        >
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
        </svg>
      </button>
      <input
        type="range"
        id="audioSlider"
        class="audio-slider"
        min="0"
        max="100"
        value="0"
        step="0.1"
      />
    </div>

    <!-- SCENE 2 -->
    <div id="scene2" class="scene-overlay hidden">
      <img id="scn2img" src="assets/scene1&2/scn2.png" class="cover-full" />
      <div class="click-hint">click to open</div>
    </div>

    <div class="book-container">
      <!-- COVER : flips open to reveal book -->
       <div class="book-container book-hidden"></div>
      <div class="page flip-page" id="coverPage">
        <div class="front">
          <img
            src="assets/scene1&2/scn2.png"
            alt="Cover"
            style="object-fit: cover"
          />
        </div>

        <div class="back inside-cover"></div>
        </div>
      </div>

      <div class="book">
        <!-- Scene 5 LEFT (static) -->
        <div class="page static-left">
          <img src="assets/scene5/scene5-left.jpg" alt="Scene 5 Left" />
        </div>

        <!-- Scene 5 RIGHT (flipping page) -->
        <div class="page flip-page" id="flipPage">
          <div class="front">
            <img src="assets/scene5/scene5-right.jpg" alt="Scene 5 Right" />
          </div>
          <div class="back">
            <img src="assets/scene6/scene6-left.jpg" alt="Scene 6 Left" />
          </div>
        </div>

        <div class="page flip-page" id="page2">
          <div class="front">
            <img src="assets/scene6/scene6-right.jpg" />
          </div>
          <div class="back">
            <img src="assets/scene7/scene7-left.jpg" />
          </div>
        </div>

        <!-- Scene 6 RIGHT (revealed after flip) -->
        <div class="page static-right">
          <img src="assets/scene6/scene6-right.jpg" />
        </div>
      </div>

      <button class="flip-btn" onclick="flipPage(event)">
        <img src="assets/button.jpg" />
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
